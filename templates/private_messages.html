<div style="
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
">
    <h2 style="margin:0;">@{{ other_user["username"] }}</h2>
</div>
{% extends "base.html" %}

{% block content %}
<section class="feed-section">
    <h1>Chat with @{{ other_user["username"] }}</h1>

   <input
    type="text"
    name="content"
    placeholder="Write a comment..."
    style="flex:1; padding:8px; border-radius:8px;"
>

    <form method="POST" action="{{ url_for('private_messages', user_id=other_user['id']) }}" style="
    display:flex;
    gap:8px;
">

    <input
        type="text"
        name="content"
        placeholder="Message @{{ other_user['username'] }}"
        style="
            flex:1;
            padding:10px;
            border-radius:20px;
            border:none;
            background:#2a2a2a;
            color:white;
        "
        required
    >

    <button type="submit" style="
        padding:10px 16px;
        border-radius:20px;
        border:none;
        background:#7ed957;
        font-weight:bold;
    ">
        Send
    </button>
</form>
</section>
{% endblock %}
<script>
    const chatBox = document.querySelector(".chat-box");
    if (chatBox) {
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
