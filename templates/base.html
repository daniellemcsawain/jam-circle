<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Jam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="navbar">
        <a href="{{ url_for('home') }}" class="logo">Campus Jam</a>
        <nav class="nav-links">
    <a href="{{ url_for('home') }}">Home</a>
    {% if session.get('user_id') %}
        <a href="{{ url_for('post') }}">Post</a>
        <a href="{{ url_for('search') }}">Search Musicians</a>
        <a href="{{ url_for('create_group') }}">Create Jam circle</a>
        <a href="{{ url_for('inbox') }}">Messages</a>
        <a href="{{ url_for('profile', username=session['username']) }}">Profile</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    {% else %}
        <a href="{{ url_for('login') }}">Login</a>
        <a href="{{ url_for('signup') }}">Sign Up</a>
    {% endif %}
</nav>
    </header>
    <main class="page-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
