{% extends "base.html" %}

{% block content %}
<section class="feed-section">
    <h2>Create a Jam Circle</h2>

    <form method="POST" action="{{ url_for('create_group') }}" style="display:grid; gap:12px; max-width:520px;">
        <input
            type="text"
            name="name"
            placeholder="Group name"
            required
        >

        <textarea
            name="description"
            placeholder="Describe your group"
            rows="5"
            required
        ></textarea>

        <button type="submit">Create Group</button>
    </form>
</section>
{% endblock %}
