{% extends "base.html" %}

{% block content %}
<section class="feed-section">
    <h2>Edit Profile</h2>

    <form method="POST" enctype="multipart/form-data" class="comment-form">
        <input type="text" name="major" placeholder="Major" value="{{ user['major'] }}">
        <input type="text" name="instrument" placeholder="Instrument" value="{{ user['instrument'] }}">
        <input type="text" name="favorite_genre" placeholder="Favorite genre" value="{{ user['favorite_genre'] }}">
        <textarea name="bio" placeholder="Your bio">{{ user['bio'] }}</textarea>

        <label>Profile picture:</label>
        <input type="file" name="profile_image" accept=".png,.jpg,.jpeg,.gif">

        <button type="submit">Save Profile</button>
    </form>
</section>
{% endblock %}
