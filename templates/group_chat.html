{% extends "base.html" %}
{% block content %}
<section class="feed-section">
    <div class="chat-header">
        <h2>{{ group['name'] }} 🎸</h2>
        <p>{{ group['description'] }}</p>
    </div>

    <div class="chat-box" style="background: #1a1a1a; padding: 20px; border-radius: 12px; height: 400px; overflow-y: scroll; margin-bottom: 20px;">
        {% for msg in messages %}
            <div class="message" style="margin-bottom: 10px;">
                <strong style="color: #7ed957;">@{{ msg['username'] }}:</strong>
                <span style="color: white;">{{ msg['content'] }}</span>
                <small style="display: block; font-size: 10px; opacity: 0.5;">{{ msg['created_at'] }}</small>
            </div>
        {% endfor %}
    </div>

    <form method="POST" class="comment-form" style="display: flex; gap: 10px;">
        <input type="text" name="content" placeholder="Send a message to the circle..." required style="flex: 1; padding: 10px; border-radius: 8px;">
        <button type="submit" style="background: #7ed957; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold;">Send</button>
    </form>
</section>
{% endblock %}
