{% extends "base.html" %}

{% block content %}
<section class="feed-section" style="
    display:flex;
    flex-direction:column;
    align-items:center;
">

    <h2 style="margin-bottom:8px;">Create a Jam Circle 🎶</h2>

    <p style="opacity:0.7; max-width:400px; text-align:center; margin-bottom:20px;">
        Start a group, meet musicians, and jam with people on campus.
    </p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div style="margin-bottom:12px;">
                {% for message in messages %}
                    <p style="color:red;">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('create_group') }}" style="
        display:flex;
        flex-direction:column;
        gap:12px;
        width:100%;
        max-width:500px;
    ">

        <input
            type="text"
            name="name"
            placeholder="🎸 Group name (ex: Dorm Guitar Jam)"
            style="
                padding:12px;
                border-radius:10px;
                border:none;
                background:#2a2a2a;
                color:white;
            "
            required
        >

        <textarea
            name="description"
            placeholder="Describe your vibe (acoustic? rap? beginner friendly?)"
            rows="5"
            style="
                padding:12px;
                border-radius:10px;
                border:none;
                background:#2a2a2a;
                color:white;
            "
            required
        ></textarea>

        <button type="submit" style="
            padding:12px;
            border-radius:12px;
            border:none;
            background:#7ed957;
            font-weight:bold;
            font-size:16px;
        ">
            🚀 Create Jam Circle
        </button>

    </form>

</section>
{% endblock %}
