{% extends "base.html" %}
{% block content %}
<section class="feed-section">
    <h2>{{ page_title }}</h2>

    {% if people %}
        <div style="display: grid; gap: 12px;">
            {% for user in people %}
                <div class="post-card" style="background: #1a1a1a; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 15px;">
                    <div class="avatar">{{ user['username'][0].upper() }}</div>
                    <div>
                        <a href="{{ url_for('profile', username=user['username']) }}" style="font-weight: bold; color: #7ed957; text-decoration: none;">
                            @{{ user['username'] }}
                        </a>
                        <p style="margin: 0; font-size: 14px; opacity: 0.7;">{{ user['instrument'] }} | {{ user['major'] }}</p>
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>No musicians to show here yet.</p>
    {% endif %}
</section>
{% endblock %}
