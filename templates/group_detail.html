{% extends "base.html" %}

{% block content %}
<section class="feed-section">
    <h1>{{ group["name"] }}</h1>
    <p>{{ group["description"] }}</p>

    <div id="messages" class="comments-box" style="margin-bottom: 20px;">
        {% if messages %}
            {% for message in messages %}
                <p><strong>@{{ message["username"] }}</strong> {{ message["content"] }}</p>
            {% endfor %}
        {% else %}
            <p>No messages yet. Be the first to send one.</p>
        {% endif %}
    </div>

    <form id="chat-form">
        <input
            type="text"
            id="message-input"
            placeholder="Write a message..."
            required
            style="padding:10px; width:70%;"
        >
        <button type="submit">Send</button>
    </form>
</section>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    const socket = io();
    const groupId = {{ group["id"] }};
    const form = document.getElementById("chat-form");
    const input = document.getElementById("message-input");
    const messagesBox = document.getElementById("messages");

    socket.emit("join_group_room", { group_id: groupId });

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const content = input.value.trim();
        if (!content) return;

        socket.emit("send_group_message", {
            group_id: groupId,
            content: content
        });

        input.value = "";
    });

    socket.on("new_group_message", function(data) {
        if (Number(data.group_id) !== Number(groupId)) return;

        const emptyText = messagesBox.querySelector("p");
        if (emptyText && emptyText.textContent.includes("No messages yet")) {
            messagesBox.innerHTML = "";
        }

        const p = document.createElement("p");
        p.innerHTML = "<strong>@" + data.username + "</strong> " + data.content;
        messagesBox.appendChild(p);
    });
</script>
{% endblock %}
