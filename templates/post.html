{% extends "base.html" %}

{% block content %}
<section class="form-card">
    <h2>Create a Post</h2>

    <form method="POST" enctype="multipart/form-data">
        <label for="caption">Caption</label>
        <textarea name="caption" id="caption" rows="4" placeholder="Say something about your clip..."></textarea>

        <label for="clip">Upload file</label>
        <input type="file" name="clip" id="clip">

        <button type="submit">Post</button>
    </form>
</section>
{% endblock %}
